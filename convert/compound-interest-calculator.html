<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compound Interest Calculator - Investment Growth Calculator Free</title>
  <meta name="description" content="Calculate compound interest and investment growth over time. Free compound interest calculator with monthly/quarterly/annual compounding options.">
  <meta name="keywords" content="compound interest calculator, investment calculator, compound growth, savings calculator free">
  <link rel="canonical" href="https://desijugad.co.in/convert/compound-interest-calculator.html">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin: 2rem 0; }
    .input-group { margin: 1.5rem 0; }
    .input-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #333; }
    input, select { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; }
    .result-card { background: #f0f7ff; padding: 1.5rem; border-radius: 8px; border-left: 4px solid #0066cc; margin: 1rem 0; }
    .result-value { font-size: 2rem; font-weight: bold; color: #0066cc; }
    .result-label { color: #666; font-size: 14px; }
    canvas { margin-top: 1rem; }
    @media (max-width: 768px) { .calc-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <a href="/" class="brand"><img src="../assets/img/logo.png" alt="Desi Jugad" class="brand-logo"></a>
    <ul class="nav-links"><li><a href="/">Back to Tools</a></li></ul>
  </div>
</header>

<main class="container" style="padding: 2rem 0;">
  <h1>Compound Interest Calculator</h1>
  <p>See how your investments grow with the power of compound interest. Perfect for SIPs, mutual funds, and savings planning.</p>

  <div class="calc-grid">
    <div>
      <div class="input-group">
        <label for="principal">Principal Amount (₹)</label>
        <input type="number" id="principal" value="100000" min="1000" step="10000">
      </div>

      <div class="input-group">
        <label for="rate">Annual Interest Rate (%)</label>
        <input type="number" id="rate" value="12" min="0.1" max="50" step="0.1">
      </div>

      <div class="input-group">
        <label for="years">Years</label>
        <input type="number" id="years" value="5" min="1" max="50" step="1">
      </div>

      <div class="input-group">
        <label for="compounding">Compounding Frequency</label>
        <select id="compounding">
          <option value="1">Annually</option>
          <option value="2">Semi-Annually</option>
          <option value="4">Quarterly</option>
          <option value="12">Monthly</option>
          <option value="365">Daily</option>
        </select>
      </div>

      <div class="input-group">
        <label for="additionalAmount">Additional Annual Contribution (₹)</label>
        <input type="number" id="additionalAmount" value="0" min="0" step="10000">
      </div>
    </div>

    <div>
      <div class="result-card">
        <div class="result-label">Principal Amount</div>
        <div class="result-value" id="principalDisplay">₹ 0</div>
      </div>

      <div class="result-card" style="background: #fef3c7; border-left-color: #f59e0b;">
        <div class="result-label">Interest Earned</div>
        <div class="result-value" id="interestDisplay" style="color: #d97706;">₹ 0</div>
      </div>

      <div class="result-card" style="background: #dcfce7; border-left-color: #16a34a;">
        <div class="result-label">Final Amount</div>
        <div class="result-value" id="finalAmount" style="color: #16a34a;">₹ 0</div>
      </div>

      <p style="color: #666; font-size: 14px; margin-top: 1rem;">
        <strong>Growth Factor:</strong> <span id="growthFactor">1.0x</span>
      </p>
    </div>
  </div>

  <canvas id="growthChart"></canvas>
</main>

<script>
  const principalInput = document.getElementById('principal');
  const rateInput = document.getElementById('rate');
  const yearsInput = document.getElementById('years');
  const compoundingInput = document.getElementById('compounding');
  const additionalInput = document.getElementById('additionalAmount');

  const principalDisplay = document.getElementById('principalDisplay');
  const interestDisplay = document.getElementById('interestDisplay');
  const finalAmount = document.getElementById('finalAmount');
  const growthFactor = document.getElementById('growthFactor');
  const canvas = document.getElementById('growthChart');
  const ctx = canvas.getContext('2d');

  function calculate() {
    const principal = parseFloat(principalInput.value) || 0;
    const rate = parseFloat(rateInput.value) || 0;
    const years = parseInt(yearsInput.value) || 1;
    const compounding = parseInt(compoundingInput.value) || 1;
    const additional = parseFloat(additionalInput.value) || 0;

    let amount = principal;
    const yearData = [principal];

    for (let y = 1; y <= years; y++) {
      const yearlyAmount = amount + additional;
      amount = yearlyAmount * Math.pow(1 + rate / (100 * compounding), compounding);
      yearData.push(amount);
    }

    const totalInterest = amount - principal - (additional * years);
    const growthX = amount / principal;

    principalDisplay.textContent = '₹ ' + principal.toLocaleString('en-IN', { maximumFractionDigits: 0 });
    interestDisplay.textContent = '₹ ' + totalInterest.toLocaleString('en-IN', { maximumFractionDigits: 0 });
    finalAmount.textContent = '₹ ' + amount.toLocaleString('en-IN', { maximumFractionDigits: 0 });
    growthFactor.textContent = growthX.toFixed(2) + 'x';

    // Draw chart
    canvas.width = canvas.offsetWidth;
    canvas.height = 300;
    const width = canvas.width;
    const height = canvas.height;
    const padding = 40;
    const maxValue = Math.max(...yearData) * 1.1;

    ctx.fillStyle = '#f9fafb';
    ctx.fillRect(0, 0, width, height);

    ctx.strokeStyle = '#e5e7eb';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 10; i++) {
      const y = padding + (height - padding * 2) * (i / 10);
      ctx.beginPath();
      ctx.moveTo(padding, y);
      ctx.lineTo(width - padding, y);
      ctx.stroke();
    }

    ctx.strokeStyle = '#2563eb';
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (let i = 0; i < yearData.length; i++) {
      const x = padding + (width - padding * 2) * (i / (yearData.length - 1));
      const y = height - padding - (height - padding * 2) * (yearData[i] / maxValue);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Draw axes
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(padding, padding);
    ctx.lineTo(padding, height - padding);
    ctx.lineTo(width - padding, height - padding);
    ctx.stroke();

    // Labels
    ctx.fillStyle = '#666';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Year', width / 2, height - 10);
    ctx.save();
    ctx.translate(15, height / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('Amount (₹)', 0, 0);
    ctx.restore();
  }

  principalInput.addEventListener('input', calculate);
  rateInput.addEventListener('input', calculate);
  yearsInput.addEventListener('input', calculate);
  compoundingInput.addEventListener('change', calculate);
  additionalInput.addEventListener('input', calculate);

  calculate();
</script>

<footer style="text-align: center; padding: 2rem 0; color: #999; font-size: 14px;">
  <p><a href="/blog/compound-interest-calculator-free.html">Learn more about compound interest →</a></p>
</footer>

</body>
</html>
